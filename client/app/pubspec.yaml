name: sleep_tight
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.7.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^15.1.1
  health: ^12.2.0
  shared_preferences: ^2.5.3
  dio: ^5.8.0+1
  flutter_svg: ^2.1.0
  toastification: ^3.0.2
  path_provider: ^2.1.5
  share_plus: ^11.0.0
  permission_handler: ^12.0.0+1
  flutter_sound: ^9.28.0
  uuid: ^4.5.1
  http_parser: ^4.1.2
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^6.1.4
  just_audio: ^0.10.2
  flutter_native_splash: ^2.4.6
  kakao_flutter_sdk_user: ^1.9.7+3
  flutter_launcher_icons: ^0.14.3
  flutter_dotenv: ^5.2.1
  flutter_form_builder: ^10.0.1
  form_builder_validators: ^11.1.2
  dropdown_button2: ^2.3.9
  group_button: ^5.3.4
  table_calendar: ^3.1.0
  collection: ^1.19.1
  fl_chart: ^1.0.0
  ffmpeg_kit_flutter_new: ^1.5.0
  audio_waveforms: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5
  change_app_package_name: ^1.5.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  fonts:
    # Memo: 기본 폰트
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.ttf
        - asset: assets/fonts/Pretendard-Medium.ttf
        - asset: assets/fonts/Pretendard-SemiBold.ttf
        - asset: assets/fonts/Pretendard-Bold.ttf
        - asset: assets/fonts/Pretendard-Light.ttf
        - asset: assets/fonts/Pretendard-ExtraBold.ttf
        - asset: assets/fonts/Pretendard-Thin.ttf
        - asset: assets/fonts/Pretendard-Black.ttf
        - asset: assets/fonts/Pretendard-ExtraLight.ttf

    # Memo: 슬롯에 사용할 폰트
    - family: Seven_Segment
      fonts:
        - asset: assets/fonts/Seven-Segment.ttf

    - family: Teko
      fonts:
        - asset: assets/fonts/Teko-Bold.ttf

  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

  assets:
    - .env # env file
    - assets/images/ # 이미지 폴더 경로 추가
    - assets/icons/ # 아이콘 폴더 경로 추가
    - assets/sound/ # 사운드 폴더 경로 추가

flutter_native_splash:
  # This package generates native code to customize Flutter's default white native splash screen
  # with background color and splash image.
  # Customize the parameters below, and run the following command in the terminal:
  # dart run flutter_native_splash:create
  # To restore Flutter's default white splash screen, run the following command in the terminal:
  # dart run flutter_native_splash:remove

  # color or background_image is the only required parameter.
  color: "#121212"
  #background_image: "assets/background.png"

  # The image parameter allows you to specify an image used in the splash screen.
  image: assets/images/sleeptight_icon_blank.png

  # Optional parameters
  android: true
  ios: true
  web: false
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

  # For Android 12 and later, use the android_12 section below.
  android_12:
    image: assets/images/sleeptight_icon_blank.png
    color: "#121212"
    #icon_background_color: "#121212"
    #branding: assets/images/branding.png
    # Optional: dark mode 지원 시 아래 옵션 사용
    #image_dark: assets/images/sleeptight_logo_00_dark.png
    #color_dark: "#000000"

  # 아래는 필요시 사용할 수 있는 추가 옵션(주석 처리)
  #branding: assets/images/branding.png
  #branding_mode: bottom
  #branding_bottom_padding: 24
  #color_dark: "#042a49"
  #background_image_dark: "assets/dark-background.png"
  #image_dark: assets/splash-invert.png
  #branding_dark: assets/dart_dark.png
  #android_screen_orientation: sensorLandscape

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/sleeptight_icon.png"
  image_path_android: "assets/images/sleeptight_icon.png"
  image_path_ios: "assets/images/sleeptight_icon.png"
  background_color_android: "#121212"
  background_color_ios: "#121212"
  remove_alpha_ios: true
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/images/sleeptight_icon.png"

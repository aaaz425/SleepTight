version: '3.8'

services:
  postgresql:
    image: postgres:13
    container_name: app-postgresql
    restart: always
    env_file:
      - ./.env
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: app-redis
    restart: always
    env_file:
      - ./.env
    volumes:
      - redis_data:/data
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: app-rabbitmq
    restart: always
    env_file:
      - ./.env
    ports:
      - "15672:15672"       # 관리 UI (선택)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app-network

networks:
  app-network:
    external: true

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
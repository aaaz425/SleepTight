version: '3.8'

services:
  # ────────────────────────────────────────────
  # 백엔드 블루/그린 서비스 분리
  # ────────────────────────────────────────────

  backend-blue:
    image: xylitol311/sleep-tight-backend:latest
    container_name: sleep-tight-backend-blue
    ports:
      - "8080:3000"              # 블루 포트
    env_file:
      - ./.env
    depends_on:
      - postgresql
      - redis
      - rabbitmq
    networks:
      - app-network
    restart: on-failure

  backend-green:
    image: xylitol311/sleep-tight-backend:latest
    container_name: sleep-tight-backend-green
    ports:
      - "8081:3000"              # 그린 포트
    env_file:
      - ./.env
    depends_on:
      - postgresql
      - redis
      - rabbitmq
    networks:
      - app-network
    restart: on-failure

  # ────────────────────────────────────────────
  # AI 서비스
  # ────────────────────────────────────────────

  ai:
    image: xylitol311/sleep-tight-ai:latest
    container_name: sleep-tight-ai
    ports:
      - "8082:8081"              # 호스트 8082 → 컨테이너 8081
    env_file:
      - ./.env
    networks:
      - app-network
    restart: on-failure

  # ────────────────────────────────────────────
  # 데이터 저장소
  # ────────────────────────────────────────────

  postgresql:
    image: postgres:13
    container_name: app-postgresql
    ports:
      - "5432:5432"
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: always

  redis:
    image: redis:latest
    container_name: app-redis
    ports:
      - "6379:6379"
    env_file:
      - ./.env
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: app-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - ./.env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app-network
    restart: always
    
networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
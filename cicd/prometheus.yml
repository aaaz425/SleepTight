# monitoring/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alarm.rules.yml"

scrape_configs:
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9114"]

  - job_name: "app"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "backend-blue:3000"
          - "backend-green:3000"
          - "ai:8081"

  - job_name: "cadvisor"
    metrics_path: /metrics
    static_configs:
      - targets: ["cadvisor:8080"]
